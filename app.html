<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#070d1c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>Auralis — App (test)</title>
</head>
<body>
<style>
  :root{
    --bg:#070d1c; --pan:#111a33; --pan2:#18223f; --line:#26325a; --line2:#334066;
    --cyan:#7fd8f0; --mauve:#b98fe0; --gold:#e9c96a;
    --txt:#e8edf8; --dim:#93a2c2; --dimmer:#63719a;
    --endo:#7fd8f0; --phyto:#8fe0a8; --he:#e6b866; --elem:#b98fe0;
  }
  *{box-sizing:border-box}
  html,body{margin:0; height:100%}
  body{background:var(--bg);
    color:var(--txt); font:16px/1.5 -apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; -webkit-font-smoothing:antialiased; display:flex; justify-content:center}
  .appbg{position:fixed; inset:0; z-index:0; background:var(--bg) url("app-images/bg.webp") center center / cover no-repeat; pointer-events:none; transition:opacity .6s ease}
  .appbg.off{opacity:0}
  .appbg::after{content:""; position:absolute; inset:0; background:linear-gradient(180deg, rgba(7,13,28,.18), rgba(7,13,28,.3) 55%, rgba(7,13,28,.42))}
  .pbg{position:fixed; inset:0; width:100%; height:100%; z-index:0; pointer-events:none}
  .app{width:100%; max-width:520px; min-height:100%; display:flex; flex-direction:column; position:relative; z-index:1}
  .view{display:none; flex-direction:column; flex:1}
  .view.on{display:flex}
  .view.on.nav-fwd{animation:viewInFwd .28s cubic-bezier(.22,.61,.36,1) both}
  .view.on.nav-back{animation:viewInBack .28s cubic-bezier(.22,.61,.36,1) both}
  @keyframes viewInFwd{from{opacity:0; transform:translateX(30px)} to{opacity:1; transform:none}}
  @keyframes viewInBack{from{opacity:0; transform:translateX(-30px)} to{opacity:1; transform:none}}

  .bar{position:sticky; top:0; z-index:5; display:flex; align-items:center; gap:12px; padding:16px 18px 12px;
       background:linear-gradient(180deg,var(--bg),rgba(7,13,28,.86)); backdrop-filter:blur(8px)}
  .bar .logo{font-size:1rem; font-weight:800; letter-spacing:.3em; margin:0}
  .bar .logo .a{color:var(--cyan)} .bar .logo .l{color:var(--mauve)}
  .bar .count{margin-left:auto; font-size:.74rem; color:var(--dimmer); font-variant-numeric:tabular-nums}
  .langwrap{position:relative; margin-left:auto}
  .langbtn{background:transparent; border:1px solid var(--mauve); color:var(--mauve); border-radius:50%; width:34px; height:34px; font-size:1.05rem; line-height:1; cursor:pointer; padding:0; display:flex; align-items:center; justify-content:center}
  .langbtn:active{background:rgba(185,143,224,.15)}
  .langmenu{position:absolute; top:calc(100% + 8px); right:0; z-index:40; min-width:168px; background:var(--pan2); border:1px solid var(--line2); border-radius:14px; padding:6px; box-shadow:0 14px 34px -8px rgba(0,0,0,.65); display:flex; flex-direction:column; gap:3px; animation:langIn .16s ease both}
  .langmenu[hidden]{display:none}
  @keyframes langIn{from{opacity:0; transform:translateY(-6px)} to{opacity:1; transform:none}}
  .langlist{display:flex; flex-direction:column; gap:7px}
  .langopt{display:flex; align-items:center; gap:10px; width:100%; text-align:left; background:var(--pan); border:1px solid var(--line); border-radius:11px; color:var(--txt); font:inherit; font-size:.9rem; padding:11px 13px; cursor:pointer; transition:border-color .12s ease, color .12s ease}
  .langopt:active{background:var(--pan2)}
  .langopt[aria-selected="true"]{border-color:var(--cyan); color:var(--cyan)}
  .langmenu .langopt{border-color:transparent; background:transparent; padding:10px 12px; border-radius:9px}
  .langmenu .langopt:active{background:var(--pan)}
  .langopt .ck{margin-left:auto; color:var(--cyan); font-weight:700}
  .backbtn{background:var(--pan); border:1px solid var(--line); color:var(--cyan); font:inherit; font-size:1.1rem; width:40px; height:40px; border-radius:11px; cursor:pointer; flex:0 0 auto}
  .bar h2{font-size:1rem; font-weight:700; margin:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}

  .home{flex:1; display:flex; flex-direction:column; padding:2px 16px 22px; overflow-y:auto; -webkit-overflow-scrolling:touch}
  .home.in > *{opacity:0; animation:cardIn .38s cubic-bezier(.22,.61,.36,1) both}
  .home.in > :nth-child(1){animation-delay:0ms} .home.in > :nth-child(2){animation-delay:50ms}
  .home.in > :nth-child(3){animation-delay:100ms} .home.in > :nth-child(4){animation-delay:150ms}
  .home.in > :nth-child(5){animation-delay:200ms} .home.in > :nth-child(6){animation-delay:250ms}
  .home.in > :nth-child(7){animation-delay:300ms} .home.in > :nth-child(8){animation-delay:350ms}
  @keyframes cardIn{from{opacity:0; transform:translateY(14px)} to{opacity:1; transform:none}}

  .heyebrow{display:flex; align-items:center; gap:9px; margin:16px 2px 10px}
  .home > .heyebrow:first-child{margin-top:4px}
  .heyebrow .het{font-size:.66rem; letter-spacing:.2em; text-transform:uppercase; color:var(--dim); font-weight:700; white-space:nowrap}
  .heyebrow .hel{height:1px; flex:1; background:linear-gradient(90deg,var(--line),transparent)}
  .heyebrow.cy .het{color:var(--cyan)}
  .heyebrow.mv .het{color:var(--mauve)} .heyebrow.mv .hel{background:linear-gradient(90deg,rgba(185,143,224,.5),transparent)}

  .hhero,.hscard,.hxcard{position:relative; display:block; text-align:left; padding:0; overflow:hidden; cursor:pointer; color:var(--txt); font:inherit; border:1px solid var(--line); border-radius:20px; transition:transform .12s ease, box-shadow .22s ease, border-color .22s ease}
  .hhero > img,.hscard > img,.hxcard > img{position:absolute; inset:0; width:100%; height:100%; object-fit:cover}
  .hscrim{position:absolute; inset:0; background:linear-gradient(180deg, rgba(7,13,28,.12) 0%, rgba(7,13,28,.4) 46%, rgba(5,7,15,.9) 100%)}
  .hhero:active,.hscard:active,.hxcard:active,.hmethod:active{transform:scale(.98)}

  .hring{position:absolute; border-radius:50%; border:2px solid rgba(255,255,255,.9); display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; color:#fff; font-weight:700; text-shadow:0 1px 10px rgba(0,0,0,.55); box-shadow:0 0 30px rgba(127,216,240,.5), inset 0 0 24px rgba(127,216,240,.2)}

  .hhero{height:300px; border-color:rgba(127,216,240,.22)}
  .hhero .hring{width:150px; height:150px; top:40px; left:50%; transform:translateX(-50%); font-size:1.6rem; font-variant-numeric:tabular-nums}
  .hhero .hring i{font-style:normal; font-size:.6rem; font-weight:500; letter-spacing:.14em; text-transform:uppercase; color:rgba(255,255,255,.72); margin-top:3px}
  .hherobody{position:absolute; left:0; right:0; bottom:0; padding:16px 78px 16px 16px}
  .htag{display:block; font-size:.62rem; letter-spacing:.13em; text-transform:uppercase; color:var(--cyan); font-weight:700; margin-bottom:6px}
  .hh2{display:block; font-size:1.25rem; font-weight:700}
  .hsub{display:block; font-size:.76rem; color:var(--dim); margin-top:3px}
  .hplay{position:absolute; right:16px; bottom:18px; width:48px; height:48px; border-radius:50%; background:var(--cyan); color:#04121a; display:flex; align-items:center; justify-content:center; font-size:1.1rem; box-shadow:0 8px 22px -6px rgba(127,216,240,.6)}

  .hsgrid{display:grid; grid-template-columns:1fr 1fr; gap:10px}
  .hscard{height:150px}
  .hsbody{position:absolute; left:0; right:0; bottom:0; padding:10px 12px}
  .hsbody b{display:block; font-size:.95rem; font-weight:700}
  .hsbody i{display:block; font-style:normal; font-size:.68rem; color:var(--dim); margin-top:2px}
  .hstar{position:absolute; top:9px; right:11px; z-index:2; color:var(--gold); font-size:.9rem; text-shadow:0 1px 6px rgba(0,0,0,.6)}

  .hexplain{margin:0 2px 10px; font-size:.72rem; line-height:1.5; color:var(--dimmer)}
  .hxrail{display:flex; gap:10px; overflow-x:auto; padding:0 16px 6px; margin:0 -16px; scrollbar-width:none}
  .hxrail::-webkit-scrollbar{display:none}
  .hxcard{flex:0 0 auto; width:120px; height:145px; border-radius:16px; border-color:rgba(185,143,224,.2)}
  .hxcard b{position:absolute; left:0; right:0; bottom:0; padding:9px 10px; font-size:.78rem; font-weight:700; z-index:2}

  .hmethod{display:flex; align-items:center; gap:12px; width:100%; margin-top:16px; padding:13px 14px; border:1px solid var(--line); border-radius:15px; background:linear-gradient(120deg, rgba(127,216,240,.08), rgba(17,26,51,.5)); color:var(--txt); font:inherit; cursor:pointer; text-align:left; transition:transform .12s ease}
  .hmic{flex:0 0 auto; width:34px; height:34px; border-radius:10px; background:rgba(127,216,240,.14); color:var(--cyan); display:flex; align-items:center; justify-content:center; font-size:1.05rem}
  .hmt{flex:1} .hmt b{display:block; font-size:.9rem; font-weight:700} .hmt i{display:block; font-style:normal; font-size:.72rem; color:var(--dim); margin-top:1px}
  .hmar{color:var(--cyan); font-size:1.1rem}

  .pad{padding:0 18px}
  .search{width:100%; background:var(--pan); border:1px solid var(--line); border-radius:12px; color:var(--txt); font:inherit; font-size:.95rem; padding:12px 14px; margin-bottom:12px}
  .search::placeholder{color:var(--dimmer)} .search:focus{outline:none; border-color:var(--cyan)}
  .filters{display:flex; gap:8px; overflow-x:auto; padding-bottom:12px; scrollbar-width:none}
  .filters::-webkit-scrollbar{display:none}
  .filters button{flex:0 0 auto; background:var(--pan); border:1px solid var(--line); color:var(--dim); font:inherit; font-size:.82rem; padding:7px 13px; border-radius:20px; cursor:pointer; white-space:nowrap}
  .filters button[aria-pressed="true"]{background:rgba(127,216,240,.13); border-color:var(--cyan); color:var(--cyan)}
  .manualbtn{width:100%; background:var(--pan); border:1px dashed var(--line2); color:var(--cyan); font:inherit; font-size:.9rem; font-weight:600; padding:12px; border-radius:12px; cursor:pointer; margin-bottom:12px}
  .manualbtn:active{background:var(--pan2)}

  .list{padding:2px 18px 20px; overflow-y:auto}
  .geogrid{display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:4px 18px 22px; overflow-y:auto}
  .gtile{display:flex; flex-direction:column; background:rgba(17,26,51,.5); border:1px solid var(--line); border-radius:14px; overflow:hidden; cursor:pointer; color:var(--txt); font:inherit; padding:0; transition:transform .12s ease, box-shadow .22s ease, background .12s ease, border-color .22s ease}
  .gtile:active{background:var(--pan2); transform:scale(.975); border-color:rgba(185,143,224,.5); box-shadow:0 0 20px rgba(185,143,224,.26)}
  .gtvis{position:relative; width:100%; aspect-ratio:1; display:flex; align-items:center; justify-content:center; background:#05070f}
  .gtvis img{width:100%; height:100%; object-fit:cover; filter:grayscale(1) contrast(1.12)}
  .gtvis img.incolor{filter:none}
  .gstagephoto.incolor{filter:none}
  .gtvis .gtico{font-size:3.4rem; line-height:1}
  .gtname{padding:9px 8px 11px; font-weight:700; font-size:.86rem; text-align:center; line-height:1.25}
  .geogrid .empty{grid-column:1/3}
  .favgrid{display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:4px 18px 22px; overflow-y:auto}
  .ftile{position:relative; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:4px; min-height:98px; background:var(--pan); border:1px solid var(--line); border-radius:14px; padding:16px 10px 12px; cursor:pointer; color:var(--txt); font:inherit; transition:transform .12s ease, box-shadow .22s ease, background .12s ease, border-color .22s ease}
  .ftile:active{background:var(--pan2); transform:scale(.975); border-color:rgba(233,201,106,.5); box-shadow:0 0 20px rgba(233,201,106,.24)}
  .ftile.vide{border-style:dashed; color:var(--dimmer)}
  .ftile .fname{font-weight:700; font-size:.9rem; line-height:1.2; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical}
  .ftile .fstar{display:inline-block; transform-origin:center}
  .ftile.justadded .fstar{animation:starPop .5s cubic-bezier(.34,1.56,.64,1)}
  @keyframes starPop{0%{transform:scale(.4) rotate(-14deg)} 55%{transform:scale(1.35) rotate(14deg); text-shadow:0 0 14px rgba(233,201,106,.95)} 100%{transform:scale(1) rotate(0); text-shadow:none}}
  .ftile .fsub{font-size:.72rem; color:var(--dim); font-variant-numeric:tabular-nums}
  .ftile .facts{position:absolute; top:5px; right:5px; display:flex; gap:1px}
  .ftile .facts .rm{font-size:.92rem; padding:3px 5px; cursor:pointer; color:var(--dimmer)}
  .ftile .facts .rm.ed{color:var(--cyan)}
  .item{display:flex; align-items:center; gap:12px; width:100%; text-align:left; background:var(--pan); border:1px solid var(--line); border-radius:12px; padding:13px 14px; margin-bottom:9px; cursor:pointer; color:var(--txt); font:inherit}
  .item:active{background:var(--pan2)}
  .item .dot{flex:0 0 auto; width:9px; height:9px; border-radius:50%}
  .dot.Endogène{background:var(--endo)} .dot.Phyto{background:var(--phyto)} .dot.Huiles{background:var(--he)} .dot.Élément{background:var(--elem)}
  .item .nm{flex:1; min-width:0; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .item .cat{font-size:.7rem; color:var(--dimmer); letter-spacing:.04em}
  .item .hz{font-variant-numeric:tabular-nums; font-weight:700; color:var(--cyan); font-size:.92rem}
  .item .fav{color:var(--gold); font-size:.9rem}
  .item .rm{flex:0 0 auto; color:var(--dimmer); font-size:1.05rem; padding:4px 6px; cursor:pointer}
  .item .rm:active{color:#e8836f}
  .item.mol{flex-direction:column; align-items:stretch; gap:2px; overflow:hidden; position:relative; min-height:98px; justify-content:center}
  .item.mol .mhead{display:flex; align-items:center; gap:12px; width:100%}
  .item.mol .desc{margin:2px 0 0; padding-left:21px; font-size:.8rem; font-weight:400; color:#fff; line-height:1.45; white-space:normal; position:relative; z-index:2; text-shadow:0 1px 4px rgba(0,0,0,.95), 0 0 10px rgba(0,0,0,.55)}
  .item.mol .itembg{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:0}
  .item.mol::before{content:""; position:absolute; inset:0; background:linear-gradient(180deg, rgba(7,13,28,.18), rgba(5,7,15,.34)); z-index:1}
  .item.mol .mhead{position:relative; z-index:2}
  .item.mol .nm{color:#fff; text-shadow:0 1px 4px rgba(0,0,0,.95), 0 0 10px rgba(0,0,0,.6)}
  .item.mol .cat{color:#fff; text-shadow:0 1px 3px rgba(0,0,0,.9)}
  .item.mol .hz{color:#eafcff; text-shadow:0 1px 4px rgba(0,0,0,.9)}
  .empty{text-align:center; color:var(--dimmer); padding:40px 20px; font-size:.9rem}

  .pcard{display:flex; align-items:center; gap:14px; width:100%; text-align:left; background:rgba(17,26,51,.5); border:1px solid var(--line); border-radius:14px; padding:11px 14px; margin-bottom:8px; cursor:pointer; color:var(--txt); font:inherit; transition:transform .12s ease, box-shadow .22s ease, background .12s ease, border-color .22s ease}
  .pcard:active{background:var(--pan2); transform:scale(.985); border-color:rgba(185,143,224,.5); box-shadow:0 0 20px rgba(185,143,224,.24)}
  .pcard .ico{flex:0 0 auto; width:44px; height:44px; border-radius:12px; background:var(--pan2); display:flex; align-items:center; justify-content:center; font-size:1.4rem}
  .pcard .pcphoto{flex:0 0 auto; width:44px; height:44px; border-radius:12px; object-fit:cover; filter:grayscale(1) contrast(1.1) brightness(0.9); border:1px solid var(--line)}
  .gstagephoto{position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:192px; height:192px; border-radius:50%; object-fit:cover; background:#05070f; filter:grayscale(1) contrast(1.15); z-index:0}
  .pcard .pt{flex:1; min-width:0} .pcard .pt b{font-size:1rem; font-weight:700} .pcard .pt span{display:block; font-size:.74rem; color:var(--dim); margin-top:1px}
  .pcard .go{color:var(--mauve); font-size:1.2rem}

  .player{flex:1; display:flex; flex-direction:column; padding:4px 20px 14px}
  .stage{position:relative; display:flex; align-items:center; justify-content:center; margin:6px 0}
  .stage::before{content:""; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:212px; height:212px; border-radius:50%;
    border:1.5px solid rgba(127,216,240,.5); box-shadow:0 0 26px 4px rgba(127,216,240,.32), 0 0 70px 20px rgba(185,143,224,.14), inset 0 0 22px rgba(127,216,240,.12);
    pointer-events:none; transition:box-shadow .5s ease, border-color .5s ease}
  .stage.playing::before{border-color:rgba(230,244,255,.9);
    box-shadow:0 0 40px 10px rgba(230,244,255,.6), 0 0 110px 34px rgba(185,143,224,.28), inset 0 0 34px rgba(230,244,255,.22);
    animation:ringpulse 2.4s ease-in-out infinite; animation-duration:var(--pulse-dur,2.4s)}
  @keyframes ringpulse{0%,100%{box-shadow:0 0 40px 10px rgba(230,244,255,.55), 0 0 110px 34px rgba(185,143,224,.26), inset 0 0 34px rgba(230,244,255,.2)}
    50%{box-shadow:0 0 56px 16px rgba(230,244,255,.72), 0 0 130px 42px rgba(185,143,224,.34), inset 0 0 40px rgba(230,244,255,.28)}}
  @media (prefers-reduced-motion: reduce){ .stage.playing::before{animation:none}
    .home.in > *{animation:none; opacity:1}
    .view.on.nav-fwd, .view.on.nav-back{animation:none}
    .hhero:active, .hscard:active, .hxcard:active, .hmethod:active, .gtile:active, .ftile:active, .pcard:active{transform:none} }
  canvas{display:block; width:200px; height:200px}
  .readout{position:absolute; text-align:center; pointer-events:none}
  .hz{font-size:2.4rem; font-weight:800; line-height:1; font-variant-numeric:tabular-nums}
  .hz .u{font-size:.9rem; font-weight:600; color:var(--dim); margin-left:3px}
  .pcat{font-size:.75rem; color:var(--dim); letter-spacing:.06em; margin-top:5px}
  .beatline{font-size:.72rem; color:var(--gold); margin-top:3px; min-height:1em}
  .pformula{font-size:1.12rem; font-weight:700; letter-spacing:.02em; color:var(--txt); line-height:1.7; white-space:nowrap}
  .pformula .pfnum{color:var(--gold); font-variant-numeric:tabular-nums}

  .seg{display:flex; background:var(--pan); border:1px solid var(--line); border-radius:12px; padding:4px; margin:10px 0 16px}
  .seg button{flex:1; background:none; border:0; color:var(--dim); font:inherit; font-size:.9rem; font-weight:600; padding:9px; border-radius:9px; cursor:pointer}
  .seg button[aria-pressed="true"]{background:var(--pan2); color:var(--txt); box-shadow:0 0 0 1px var(--line)}

  .label{font-size:.68rem; letter-spacing:.14em; text-transform:uppercase; color:var(--dimmer)}
  .ctl{margin-bottom:11px}
  .ctl .row{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:7px}
  .ctl .row .v{font-variant-numeric:tabular-nums; font-weight:700}
  input[type=range]{-webkit-appearance:none; appearance:none; width:100%; height:6px; border-radius:6px; background:linear-gradient(90deg,var(--cyan),var(--mauve)); outline:none; margin:0}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none; width:22px; height:22px; border-radius:50%; background:#fff; border:3px solid var(--cyan); cursor:pointer}
  input[type=range]::-moz-range-thumb{width:20px; height:20px; border-radius:50%; background:#fff; border:3px solid var(--cyan); cursor:pointer}
  .hint.head{font-size:.76rem; color:var(--gold); margin:8px 0 0}

  .mInput{width:100%; text-align:center; background:var(--pan); border:1px solid var(--cyan); border-radius:12px; color:var(--txt); font:inherit; font-size:1.8rem; font-weight:800; font-variant-numeric:tabular-nums; padding:12px; margin-bottom:10px}
  .mInput:focus{outline:none; box-shadow:0 0 0 3px rgba(127,216,240,.25)}
  .binpanel{background:var(--pan); border:1px solid var(--line); border-radius:14px; padding:10px 12px; margin-bottom:8px}
  .binrow{margin-bottom:6px} .binrow:last-of-type{margin-bottom:4px}
  .binrow .label{margin-bottom:4px}
  .binrow .val{margin:0; font-size:1.35rem; font-weight:800; font-variant-numeric:tabular-nums; color:var(--dim)}
  .binrow:first-child .val{color:var(--cyan)} .binrow:nth-child(2) .val{color:var(--mauve)}
  .binhint{font-size:.72rem; color:var(--dimmer); text-align:center; margin:6px 0 0}
  .keypad{display:grid; grid-template-columns:repeat(3,1fr); gap:6px}
  .keypad button{background:var(--pan); border:1px solid var(--line); color:var(--txt); font:inherit; font-size:1.25rem; font-weight:700; padding:8px 0; border-radius:10px; cursor:pointer}
  .keypad button:active{background:var(--pan2)}
  .keypad button.ok{grid-column:span 3; margin-top:2px; border:0; color:#04101f; font-size:1.05rem; font-weight:800; background:linear-gradient(96deg,var(--cyan),var(--mauve))}
  .binpresets{display:grid; grid-template-columns:repeat(2,1fr); gap:10px}

 home_method_body:{fr:"<h3>Éléments &amp; molécules</h3><p>Chaque fréquence est dérivée d'une molécule ou d'un élément par une formule simple et constante. On part de sa <b>masse molaire</b> (sa masse en g/mol), qu'on multiplie par un facteur fixe, puis on ramène le résultat par octaves (en divisant ou multipliant par 2) dans une plage douce et audible, autour de 70 à 200 Hz.</p><div class='formula'><span class='fline'>masse molaire × 2,98095 → octave (× ou ÷ 2) → fréquence</span><span class='fex'>Exemple : Magnésium 24,305 g/mol × 2,98095 = 72,45 Hz</span></div><p>Cette approche — traduire la masse molaire d'une molécule en fréquence sonore — s'inscrit dans la lignée des travaux du physicien français <b>Joël Sternheimer</b>, utilisés en France depuis plus de 30 ans. Il a formulé la théorie des « protéodies », les mélodies des protéines, en associant à chaque acide aminé une note calculée à partir de sa masse, via l'équation d'Einstein/Planck (h·f = m·c²) transposée de plusieurs octaves. C'est une théorie exploratoire, présentée ici comme source d'inspiration de notre démarche, sans prétention thérapeutique.</p><p class='note'>C'est une transposition : on traduit l'identité numérique d'une molécule en une note. Cette correspondance est une démarche de conception et d'exploration sonore — elle n'a pas d'effet thérapeutique démontré.</p><h3>Planètes</h3><p>Les planètes suivent l'<b>Octave Cosmique</b>. On part de la <b>période</b> d'un astre — son année, son jour ou son mois — qui correspond à une fréquence très basse (1 ÷ durée). On la <b>double un grand nombre de fois</b> (montée par octaves, ×2) jusqu'à entrer dans le domaine audible. Exemple : l'année terrestre donne le fameux 136,10 Hz (le « Om »).</p><h3>Couleurs</h3><p>Chaque couleur part de sa <b>longueur d'onde lumineuse</b>, ramenée dans le son par octaves jusqu'au domaine audible — comme les molécules, mais à partir de la lumière.</p><h3>Agroglyphes, géométrie sacrée &amp; flocons</h3><p>Ces figures ne partent pas d'une masse mais de leur <b>forme</b>. Leur symétrie et leurs proportions (nombre de branches, nombre d'or, axes) sont traduites en <b>rapports diatoniques</b> — des intervalles musicaux à nombres simples : l'octave (2:1), la quinte (3:2), la quarte (4:3), la tierce (5:4)… Chaque figure joue ainsi un accord ou une gamme qui reflète sa structure géométrique.</p><p class='note'>Bien-être et relaxation — sans usage médical ni allégation de santé.</p>",en:"<h3>Elements &amp; molecules</h3><p>Each frequency is derived from a molecule or an element through a simple, constant formula. We start from its <b>molar mass</b> (its mass in g/mol), multiply it by a fixed factor, then bring the result into a gentle, audible range (around 70–200 Hz) by octaves (dividing or multiplying by 2).</p><div class='formula'><span class='fline'>molar mass × 2.98095 → octave (× or ÷ 2) → frequency</span><span class='fex'>Example: Magnesium 24.305 g/mol × 2.98095 = 72.45 Hz</span></div><p>This approach — turning a molecule's molar mass into a sound frequency — follows the work of French physicist <b>Joël Sternheimer</b>, used in France for over 30 years. He formulated the theory of 'proteodies', the melodies of proteins, matching each amino acid to a note calculated from its mass via the Einstein/Planck equation (h·f = m·c²) transposed by several octaves. It is an exploratory theory, presented here as the inspiration behind our approach, with no therapeutic claim.</p><p class='note'>It's a transposition: we turn a molecule's numerical identity into a note. This correspondence is a design and sound-exploration approach — it has no proven therapeutic effect.</p><h3>Planets</h3><p>The planets follow the <b>Cosmic Octave</b>. We start from a body's <b>period</b> — its year, day or month — which corresponds to a very low frequency (1 ÷ duration). We <b>double it many times</b> (raising by octaves, ×2) until it reaches the audible range. Example: the Earth year gives the well-known 136.10 Hz (the 'Om').</p><h3>Colors</h3><p>Each color starts from its <b>light wavelength</b>, brought into sound by octaves down to the audible range — like the molecules, but from light.</p><h3>Crop circles, sacred geometry &amp; snowflakes</h3><p>These figures don't come from a mass but from their <b>shape</b>. Their symmetry and proportions (number of arms, golden ratio, axes) are turned into <b>diatonic ratios</b> — musical intervals with simple whole numbers: the octave (2:1), the fifth (3:2), the fourth (4:3), the third (5:4)… Each figure thus plays a chord or scale that mirrors its geometric structure.</p><p class='note'>Wellness and relaxation — not for medical use and with no health claims.</p>",es:"<h3>Elementos y moléculas</h3><p>Cada frecuencia se deriva de una molécula o de un elemento mediante una fórmula simple y constante. Partimos de su <b>masa molar</b> (su masa en g/mol), la multiplicamos por un factor fijo, y luego llevamos el resultado por octavas (dividiendo o multiplicando por 2) a un rango suave y audible, en torno a 70 a 200 Hz.</p><div class='formula'><span class='fline'>masa molar × 2,98095 → octava (× o ÷ 2) → frecuencia</span><span class='fex'>Ejemplo: Magnesio 24,305 g/mol × 2,98095 = 72,45 Hz</span></div><p>Este enfoque — traducir la masa molar de una molécula en frecuencia sonora — se inscribe en la línea de los trabajos del físico francés <b>Joël Sternheimer</b>, utilizados en Francia desde hace más de 30 años. Formuló la teoría de las «proteodías», las melodías de las proteínas, asociando a cada aminoácido una nota calculada a partir de su masa, mediante la ecuación de Einstein/Planck (h·f = m·c²) transpuesta varias octavas. Es una teoría exploratoria, presentada aquí como fuente de inspiración de nuestro enfoque, sin pretensión terapéutica.</p><p class='note'>Es una transposición: traducimos la identidad numérica de una molécula en una nota. Esta correspondencia es un enfoque de diseño y exploración sonora — no tiene efecto terapéutico demostrado.</p><h3>Planetas</h3><p>Los planetas siguen la <b>Octava Cósmica</b>. Partimos del <b>período</b> de un astro — su año, su día o su mes — que corresponde a una frecuencia muy baja (1 ÷ duración). La <b>duplicamos muchas veces</b> (subida por octavas, ×2) hasta entrar en el rango audible. Ejemplo: el año terrestre da el famoso 136,10 Hz (el 'Om').</p><h3>Colores</h3><p>Cada color parte de su <b>longitud de onda luminosa</b>, llevada al sonido por octavas hasta el rango audible — como las moléculas, pero a partir de la luz.</p><h3>Agroglifos, geometría sagrada y copos de nieve</h3><p>Estas figuras no parten de una masa sino de su <b>forma</b>. Su simetría y proporciones (número de brazos, número áureo, ejes) se traducen en <b>proporciones diatónicas</b> — intervalos musicales de números simples: la octava (2:1), la quinta (3:2), la cuarta (4:3), la tercera (5:4)… Cada figura toca así un acorde o escala que refleja su estructura geométrica.</p><p class='note'>Bienestar y relajación — sin uso médico ni afirmaciones de salud.</p>"}

  // ================= 432 Hz PULSÉ =================
  var pulse={bpm:72,vol:0.5,playing:false,master:null,osc:null,trem:null,dc:null,lfo:null,lfoGain:null};
  function pulseSetBtn(on){ var b=$("pPlay"); b.classList.toggle("on",on); b.textContent=on?t("stop"):t("play"); var st=$("pViz").parentNode; st.classList.toggle("playing",on); if(on)st.style.setProperty("--pulse-dur",(60/pulse.bpm).toFixed(3)+"s"); else st.style.removeProperty("--pulse-dur"); setBg(false); }
  function pulseStart(){ ensureCtx(); unlockAudio(); var t=ctx.currentTime+0.05;
    pulse.master=ctx.createGain(); pulse.master.gain.setValueAtTime(0.0001,t); pulse.master.gain.linearRampToValueAtTime(pulse.vol,t+0.08); pulse.master.connect(ctx.destination);
    pulse.osc=ctx.createOscillator(); pulse.osc.type="sine"; pulse.osc.frequency.setValueAtTime(432,t);
    pulse.trem=ctx.createGain(); pulse.trem.gain.setValueAtTime(0.65,t);
    pulse.dc=ctx.createConstantSource(); pulse.dc.offset.setValueAtTime(0.65,t);
    pulse.lfo=ctx.createOscillator(); pulse.lfo.type="sine"; pulse.lfo.frequency.setValueAtTime(pulse.bpm/60,t);
    pulse.lfoGain=ctx.createGain(); pulse.lfoGain.gain.setValueAtTime(0.35,t);
    pulse.lfo.connect(pulse.lfoGain); pulse.lfoGain.connect(pulse.trem.gain); pulse.dc.connect(pulse.trem.gain);
    pulse.osc.connect(pulse.trem); pulse.trem.connect(pulse.master);
    pulse.osc.start(t); pulse.lfo.start(t); pulse.dc.start(t);
    pulse.playing=true; pulseSetBtn(true); }
  function pulseStop(immediate){ if(!ctx||!pulse.master){ pulse.playing=false; pulseSetBtn(false); return; }
    var ti=ctx.currentTime,m=pulse.master,o=pulse.osc,l=pulse.lfo,d=pulse.dc;
    try{ m.gain.cancelScheduledValues(ti); m.gain.setValueAtTime(m.gain.value,ti); m.gain.linearRampToValueAtTime(0.0001,ti+(immediate?0.02:0.08)); }catch(e){}
    setTimeout(function(){ [o,l,d].forEach(function(nd){ try{nd.stop();nd.disconnect();}catch(e){} }); try{m.disconnect();}catch(e){} }, immediate?40:140);
    pulse.master=null; pulse.osc=null; pulse.trem=null; pulse.dc=null; pulse.lfo=null; pulse.lfoGain=null; pulse.playing=false; pulseSetBtn(false); }
  function pulseUpdTitle(){ $("pulseTitle").textContent=t("pulse_base")+" @ "+pulse.bpm+" bpm"; }
  function openPulse(from,bpm){ pulseStop(true); returnTo=from||"home";
    if(typeof bpm==="number"){ pulse.bpm=Math.max(40,Math.min(120,bpm)); }
    $("pBpm").value=pulse.bpm; $("pBpmVal").textContent=pulse.bpm+" bpm"; $("pBpmNum").textContent=pulse.bpm;
    pulseUpdTitle(); pulseSetBtn(false); show("pulse"); }
  $("pBack").addEventListener("click",function(){ pulseStop(false); show(returnTo); });
  $("pBpm").addEventListener("input",function(){ pulse.bpm=parseInt(this.value,10); $("pBpmVal").textContent=pulse.bpm+" bpm"; $("pBpmNum").textContent=pulse.bpm; pulseUpdTitle();
    if(pulse.playing){ if(pulse.lfo&&ctx)pulse.lfo.frequency.setTargetAtTime(pulse.bpm/60,ctx.currentTime,0.05); $("pViz").parentNode.style.setProperty("--pulse-dur",(60/pulse.bpm).toFixed(3)+"s"); } });
  $("pVol").addEventListener("input",function(){ pulse.vol=parseInt(this.value,10)/100; $("pVolLbl").textContent=this.value; if(pulse.master&&ctx)pulse.master.gain.setTargetAtTime(pulse.playing?pulse.vol:0,ctx.currentTime,0.02); });
  $("pPlay").addEventListener("click",function(){ unlockAudio(); if(pulse.playing)pulseStop(false); else pulseStart(); });

  var bin={step:1,f1:0,f2:0,kb:"",vol:0.5,playing:false,master:null,oscA:null,oscB:null};
  function binReset(){ bin.step=1; bin.f1=0; bin.f2=0; bin.kb=""; }
  function openBinInput(){ binStop(true); binReset(); returnTo="home"; $("binStepTitle").textContent=t("home_bin"); $("binPickHint").textContent=t("bin_pick_hint"); renderBinPresets(); show("binInput"); }
  $("binBack").addEventListener("click",function(){ binStop(true); show("home"); });

  var BIN_PRESETS=[{beat:2,band:"bin_delta"},{beat:4,band:"bin_theta"},{beat:6,band:"bin_theta"},{beat:8,band:"bin_alpha"},{beat:10,band:"bin_alpha"},{beat:14,band:"bin_beta"},{beat:18,band:"bin_beta"},{beat:20,band:"bin_beta"}];
  var BIN_SYM={bin_delta:"Δ",bin_theta:"θ",bin_alpha:"α",bin_beta:"β"};
  function renderBinPresets(){ var el=$("binPresets"); if(!el)return; el.innerHTML="";
    BIN_PRESETS.forEach(function(p){ var b=document.createElement("button");
      b.innerHTML="<b>"+p.beat+" Hz</b><span>"+BIN_SYM[p.band]+" "+t(p.band)+"</span>";
      b.addEventListener("click",function(){ bin.f1=108-p.beat/2; bin.f2=108+p.beat/2; bin.kb=""; openBinPlay(); }); el.appendChild(b);
    }); }

  function showBinError(){ $("binDiff").textContent=t("bin_diff")+" : "+Math.abs(bin.f1-bin.f2).toFixed(2)+" Hz"; show("binError"); }
  $("binRetry").addEventListener("click",function(){ binReset(); renderBinPresets(); show("binInput"); });
  $("binErrBack").addEventListener("click",function(){ binReset(); show("home"); });

  function drawStars(cvId){ var c=$(cvId),g=c.getContext("2d"),W=c.width,H=c.height; g.clearRect(0,0,W,H);
    for(var i=0;i<80;i++){ var x=Math.random()*W,y=Math.random()*H,r=(i%3===0)?1.6:1;
      g.beginPath(); g.arc(x,y,r,0,Math.PI*2); g.fillStyle=(i%4===0)?"rgba(127,216,240,.9)":"rgba(147,162,194,.7)"; g.fill(); } }
  function openBinPlay(){
    $("binF1Lbl").textContent=t("bin_f1")+" "+bin.f1.toFixed(4)+" Hz";
    $("binF2Lbl").textContent=t("bin_f2")+" "+bin.f2.toFixed(4)+" Hz";
    $("binBeatLbl").textContent=t("bin_beat")+" : "+Math.abs(bin.f1-bin.f2).toFixed(2)+" Hz";
    show("binPlay"); drawStars("binStars"); binStart();
  }
  function binStart(){ ensureCtx(); unlockAudio(); var ti=ctx.currentTime;
    bin.master=ctx.createGain(); bin.master.gain.setValueAtTime(0.0001,ti); bin.master.gain.linearRampToValueAtTime(bin.vol,ti+0.05); bin.master.connect(ctx.destination);
    bin.oscA=ctx.createOscillator(); bin.oscA.type="sine"; bin.oscA.frequency.setValueAtTime(bin.f1,ti);
    bin.oscB=ctx.createOscillator(); bin.oscB.type="sine"; bin.oscB.frequency.setValueAtTime(bin.f2,ti);
    var pa=ctx.createStereoPanner(); pa.pan.setValueAtTime(-1,ti); var pb=ctx.createStereoPanner(); pb.pan.setValueAtTime(1,ti);
    bin.oscA.connect(pa); pa.connect(bin.master); bin.oscB.connect(pb); pb.connect(bin.master);
    bin.oscA.start(ti); bin.oscB.start(ti); bin.playing=true; setBg(true); }
  function binStop(immediate){ if(!ctx||!bin.master){ bin.playing=false; return; }
    var ti=ctx.currentTime,m=bin.master,a=bin.oscA,b=bin.oscB;
    try{ m.gain.cancelScheduledValues(ti); m.gain.setValueAtTime(m.gain.value,ti); m.gain.linearRampToValueAtTime(0.0001,ti+(immediate?0.02:0.06)); }catch(e){}
    setTimeout(function(){ [a,b].forEach(function(o){try{o.stop();o.disconnect();}catch(e){}}); try{m.disconnect();}catch(e){} }, immediate?40:120);
    bin.master=null; bin.oscA=null; bin.oscB=null; bin.playing=false; setBg(false); }
  $("binVol").addEventListener("input",function(){ bin.vol=parseInt(this.value,10)/100; $("binVolLbl").textContent=this.value; if(bin.master&&ctx)bin.master.gain.setTargetAtTime(bin.playing?bin.vol:0,ctx.currentTime,0.02); });
  $("binStop").addEventListener("click",function(){ binStop(false); show("home"); });

  // ---------- favoris = constructeur de séquence (façon boîtier) ----------
  var favJustSaved=-1;
  function renderFavList(){
    $("favTitle").textContent=t("fav_title");
    var el=$("favListEl"); el.innerHTML="";
    favSlots.forEach(function(f,i){
      var row=document.createElement("button"); row.className="ftile"+(i===favJustSaved?" justadded":"");
      if(f){
        var tot=f.steps.reduce(function(a,s){return a+s.m;},0);
        row.innerHTML='<span class="facts"><span class="rm ed" data-a="edit">✎</span><span class="rm" data-a="del">✕</span></span>'
          +'<span class="fname"><span class="fstar">⭐</span> '+f.name+'</span><span class="fsub">'+f.steps.length+' '+t("steps")+' · '+tot+' min</span>';
        row.addEventListener("click",function(ev){
          var a=ev.target.getAttribute&&ev.target.getAttribute("data-a");
          if(a==="del"){ favSlots[i]=null; saveFavSlots(); renderFavList(); return; }
          if(a==="edit"){ favBuild={slot:i, steps:f.steps.slice(), name:f.name}; show("favRecap"); renderFavRecap(); return; }
          openSeq({fr:f.name,en:f.name,es:f.name,ic:"⭐",s:f.steps}, "favList");
        });
      } else {
        row.className="ftile vide";
        row.innerHTML='<span class="fname">'+t("fav_new")+'</span>';
        row.addEventListener("click",function(){ favBuild={slot:i, steps:[]}; enterFavPicker(); });
      }
      el.appendChild(row);
    });
    favJustSaved=-1;
  }
  function enterFavPicker(){ $("libTitle").textContent=t(favBuild.slot==null?"chain_pick_title":"fav_pick_title"); show("lib"); }
  function favPickFreq(m){ favBuild.pending={n:m.n, f:m.f}; openFavKeypad("duration"); }
  function favBuildCancelHome(){ var hadSlot=favBuild&&favBuild.slot!=null; favBuild=null; $("libTitle").textContent=t("tab_freq"); if(hadSlot){ show("favList"); renderFavList(); } else show("home"); }
  $("chainBtn").addEventListener("click",function(){ favBuild={slot:null, steps:[]}; enterFavPicker(); });

  var favKb={mode:"duration",kb:""};
  function openFavKeypad(mode){ favKb.mode=mode; favKb.kb=""; renderFavKeypad(); show("favKeypad"); }
  function renderFavKeypad(){
    if(favKb.mode==="duration"){
      $("favKbTitle").textContent=t("fav_dur_title");
      $("favKbSub").textContent=favBuild.pending.n+"  —  "+favBuild.pending.f.toFixed(4)+" Hz";
      $("favKbVal").textContent=(favKb.kb||"—")+" min";
      $("favKbHint").textContent=t("fav_dur_hint");
    } else {
      $("favKbTitle").textContent=t("manual_title");
      $("favKbSub").textContent="";
      $("favKbVal").textContent=(favKb.kb||"—.—")+" Hz";
      $("favKbHint").textContent="";
    }
  }
  function favKbDigit(d){ var max=(favKb.mode==="duration")?2:9; if(favKb.kb.length>=max)return; if(d==="."){ if(favKb.mode==="duration"||favKb.kb.indexOf(".")>=0)return; } favKb.kb+=d; renderFavKeypad(); }
  function favKbBack(){ favKb.kb=favKb.kb.slice(0,-1); renderFavKeypad(); }
  function favKbOk(){
    if(favKb.mode==="duration"){
      var mn=parseInt(favKb.kb,10);
      if(!favKb.kb||isNaN(mn)||mn<1||mn>60){ flashMsg(t("fav_dur_err")); return; }
      favBuild.steps.push({n:favBuild.pending.n, f:favBuild.pending.f, m:mn});
      favBuild.pending=null;
      renderFavNext(); show("favNext");
    } else {
      var v=parseFloat(favKb.kb); if(!favKb.kb||isNaN(v)||v<=0)return;
      favBuild.pending={n:t("manual_title"), f:v};
      openFavKeypad("duration");
    }
  }
  Array.prototype.forEach.call(document.querySelectorAll("#favKeypadGrid button[data-k]"),function(b){
    b.addEventListener("click",function(){ var k=b.getAttribute("data-k"); if(k==="back")favKbBack(); else favKbDigit(k); });
  });
  $("favKbOk").addEventListener("click",favKbOk);
  $("favKbBack").addEventListener("click",function(){ show("lib"); });

  function renderFavNext(){
    $("favNextTitle").textContent=t("fav_next_title");
    var n=favBuild.steps.length;
    $("favNextCount").textContent=n+" "+(n>1?t("fav_count_many"):t("fav_count_one"));
    var last=favBuild.steps[n-1];
    $("favNextLast").textContent=t("fav_last_added")+" : "+last.n+" — "+last.m+" min";
  }
  $("favAddMore").addEventListener("click",function(){
    if(favBuild.steps.length>=FAV_STEP_MAX){ flashMsg(t("fav_max_steps")); return; }
    enterFavPicker();
  });
  $("favPlaySel").addEventListener("click",function(){ show("favRecap"); renderFavRecap(); });
  $("favNextCancel").addEventListener("click",favBuildCancelHome);

  function renderFavRecap(){
    $("favRecapTitle").textContent=t("fav_recap_title");
    var el=$("favRecapSteps"); el.innerHTML="";
    favBuild.steps.forEach(function(s,i){
      var li=document.createElement("li");
      li.innerHTML='<span class="si">'+(i+1)+'</span><span class="sn">'+tn(s.n)+'</span><span class="sh">'+s.f.toFixed(2)+' Hz</span><span class="sm">'+s.m+'m</span><span class="rm">✕</span>';
      li.querySelector(".rm").addEventListener("click",function(){
        favBuild.steps.splice(i,1);
        if(!favBuild.steps.length) favBuildCancelHome(); else renderFavRecap();
      });
      el.appendChild(li);
    });
  }
  $("favRecapBack").addEventListener("click",favBuildCancelHome);
  $("favRecapCancel").addEventListener("click",favBuildCancelHome);
  $("favRecapAdd").addEventListener("click",function(){
    if(favBuild.steps.length>=FAV_STEP_MAX){ flashMsg(t("fav_max_steps")); return; }
    enterFavPicker();
  });
  $("favRecapPlay").addEventListener("click",function(){
    var steps=favBuild.steps.slice(), name=t("chain_temp_name");
    favBuild=null; $("libTitle").textContent=t("tab_freq");
    openSeq({fr:name,en:name,es:name,ic:"🔗",s:steps}, "home");
  });
  $("favRecapSave").addEventListener("click",function(){
    $("favNameTitle").textContent=t("fav_name_title");
    $("favNameInput").placeholder=t("fav_name_ph");
    $("favNameInput").value=favBuild.name||"";
    show("favName");
  });
  $("favNameBack").addEventListener("click",function(){ show("favRecap"); });
  $("favNameSave").addEventListener("click",function(){
    var slot=favBuild.slot;
    if(slot==null){ slot=favSlots.findIndex(function(s){return !s;}); if(slot<0){ flashMsg(t("fav_no_slot")); return; } }
    var name=$("favNameInput").value.trim() || (t("fav_default_name")+" "+(slot+1));
    favSlots[slot]={name:name, steps:favBuild.steps.slice()};
    saveFavSlots(); favJustSaved=slot;
    favBuild=null; $("libTitle").textContent=t("tab_freq");
    show("favList"); renderFavList();
  });

  // ---------- fond de particules ----------
  var Particles=null;
  (function(){
    var cv=$("pbg"); if(!cv)return;
    var g2=cv.getContext("2d"); if(!g2)return;
    var P=[],W=0,H=0,raf=null,last=0;
    var level="full", dens=1, spd=1, tw=true;   // dens=densité, spd=vitesse, tw=scintillement
    var COLS=["127,216,240","127,216,240","127,216,240","185,143,224","185,143,224","233,201,106"];
    function animates(){ return level!=="off" && !prefersReduce; }
    function size(){ var d=Math.min(window.devicePixelRatio||1,2);
      W=window.innerWidth; H=window.innerHeight;
      cv.width=Math.round(W*d); cv.height=Math.round(H*d); g2.setTransform(d,0,0,d,0,0); }
    function make(){ P=[]; var base=Math.max(40,Math.min(80,Math.round(W*H/14000))); var n=Math.round(base*dens);
      for(var i=0;i<n;i++){ var glow=Math.random()<0.12;
        P.push({ x:Math.random()*W, y:Math.random()*H,
          r:glow?(6+Math.random()*8):(0.7+Math.random()*1.5), g:glow,
          a:glow?(0.04+Math.random()*0.05):(0.08+Math.random()*0.24),
          c:COLS[(Math.random()*COLS.length)|0],
          vx:(Math.random()*12-6), vy:-(5+Math.random()*13),
          ph:Math.random()*6.283, ps:0.3+Math.random()*0.9 }); } }
    function draw(twinkle){ g2.clearRect(0,0,W,H);
      for(var i=0;i<P.length;i++){ var p=P[i];
        var a=twinkle?p.a*(0.55+0.45*Math.sin(p.ph)):p.a;
        if(p.g){ var gr=g2.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);
          gr.addColorStop(0,"rgba("+p.c+","+a.toFixed(3)+")"); gr.addColorStop(1,"rgba("+p.c+",0)");
          g2.fillStyle=gr; g2.fillRect(p.x-p.r,p.y-p.r,p.r*2,p.r*2); }
        else { g2.fillStyle="rgba("+p.c+","+a.toFixed(3)+")";
          g2.beginPath(); g2.arc(p.x,p.y,p.r,0,6.283); g2.fill(); } } }
    function step(ts){ raf=requestAnimationFrame(step);
      if(!last){ last=ts; return; }
      var dt=Math.min((ts-last)/1000,0.1); last=ts;
      for(var i=0;i<P.length;i++){ var p=P[i];
        p.x+=p.vx*spd*dt; p.y+=p.vy*spd*dt; p.ph+=p.ps*dt;
        if(p.y<-20){ p.y=H+20; p.x=Math.random()*W; }
        if(p.x<-20)p.x=W+20; else if(p.x>W+20)p.x=-20; }
      draw(tw); }
    function start(){ if(raf)return; if(!animates()){ draw(false); return; } last=0; raf=requestAnimationFrame(step); }
    function stop(){ if(raf){ cancelAnimationFrame(raf); raf=null; } }
    function setLevel(lv){ level=lv; stop();
      if(lv==="off"){ cv.style.display="none"; g2.clearRect(0,0,W,H); return; }
      cv.style.display="";
      if(lv==="reduced"){ dens=0.45; spd=0.55; tw=false; } else { dens=1; spd=1; tw=true; }
      size(); make(); start(); }
    Particles={ setLevel:setLevel };
    setLevel(settings.anim);
    document.addEventListener("visibilitychange",function(){ if(document.hidden)stop(); else if(level!=="off")start(); });
    var rT=null;
    window.addEventListener("resize",function(){ clearTimeout(rT);
      rT=setTimeout(function(){ if(level==="off")return; stop(); size(); make(); start(); },200); });
  })();

  // ---------- paramètres ----------
  function applyDefaultVolume(pct){ var f=pct/100; state.vol=f; gp.vol=f; pulse.vol=f; bin.vol=f;
    [["vol","volLbl"],["sVol","sVolLbl"],["gVol","gVolLbl"],["pVol","pVolLbl"],["binVol","binVolLbl"]].forEach(function(p){ var s=$(p[0]),l=$(p[1]); if(s)s.value=pct; if(l)l.textContent=pct; }); }
  function renderSettings(){
    Array.prototype.forEach.call(document.querySelectorAll("#setAnim button"),function(b){ b.setAttribute("aria-pressed", b.getAttribute("data-v")===settings.anim?"true":"false"); });
    fillLangList($("setLang"));
    $("setVol").value=settings.vol; $("setVolVal").textContent=settings.vol; }
  $("setBtn").addEventListener("click",function(){ show("settings"); renderSettings(); });
  $("setBack").addEventListener("click",function(){ show("home"); });
  Array.prototype.forEach.call(document.querySelectorAll("#setAnim button"),function(b){ b.addEventListener("click",function(){ settings.anim=b.getAttribute("data-v"); saveSettings(); if(Particles)Particles.setLevel(settings.anim); renderSettings(); }); });
  // sélecteur de langue des Réglages : peuplé par fillLangList (clics câblés à la création)
  $("setVol").addEventListener("input",function(){ settings.vol=parseInt(this.value,10); $("setVolVal").textContent=settings.vol; applyDefaultVolume(settings.vol); saveSettings(); });

  makeViz("viz",function(){return state.playing;});
  makeViz("sViz",function(){return seq.playing;});
  makeViz("pViz",function(){return pulse.playing;});

  applyDefaultVolume(settings.vol);
  applyLang(); show("home");
})();
</script>
