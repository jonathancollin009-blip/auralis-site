<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#070d1c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>Auralis — App (test)</title>
</head>
<body>
<style>
  :root{
    --bg:#070d1c; --pan:#111a33; --pan2:#18223f; --line:#26325a; --line2:#334066;
    --cyan:#7fd8f0; --mauve:#b98fe0; --gold:#e9c96a;
    --txt:#e8edf8; --dim:#93a2c2; --dimmer:#63719a;
    --endo:#7fd8f0; --phyto:#8fe0a8; --he:#e6b866; --elem:#b98fe0;
  }
  *{box-sizing:border-box}
  html,body{margin:0; height:100%}
  body{background:radial-gradient(900px 560px at 50% -12%, rgba(127,216,240,.09), transparent 60%), var(--bg);
    color:var(--txt); font:16px/1.5 -apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; -webkit-font-smoothing:antialiased; display:flex; justify-content:center}
  .app{width:100%; max-width:520px; min-height:100%; display:flex; flex-direction:column; position:relative}
  .view{display:none; flex-direction:column; flex:1}
  .view.on{display:flex}

  .bar{position:sticky; top:0; z-index:5; display:flex; align-items:center; gap:12px; padding:16px 18px 12px;
       background:linear-gradient(180deg,var(--bg),rgba(7,13,28,.86)); backdrop-filter:blur(8px)}
  .bar .logo{font-size:1rem; font-weight:800; letter-spacing:.3em; margin:0}
  .bar .logo .a{color:var(--cyan)} .bar .logo .l{color:var(--mauve)}
  .bar .count{margin-left:auto; font-size:.74rem; color:var(--dimmer); font-variant-numeric:tabular-nums}
  .langbtn{background:transparent; border:1px solid var(--mauve); color:var(--mauve); border-radius:18px; font:inherit; font-size:.78rem; font-weight:700; padding:5px 12px; cursor:pointer; letter-spacing:.05em; margin-left:auto}
  .backbtn{background:var(--pan); border:1px solid var(--line); color:var(--cyan); font:inherit; font-size:1.1rem; width:40px; height:40px; border-radius:11px; cursor:pointer; flex:0 0 auto}
  .bar h2{font-size:1rem; font-weight:700; margin:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}

  .hgrid{display:grid; grid-template-columns:1fr 1fr; gap:14px; padding:10px 18px 26px}
  .hcard{display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; aspect-ratio:1; background:var(--pan); border:1px solid var(--line); border-radius:20px; color:var(--txt); font:inherit; cursor:pointer}
  .hcard:active{background:var(--pan2)}
  .hcard .hic{font-size:2.3rem}
  .hcard .hn{font-size:.94rem; font-weight:700; text-align:center; letter-spacing:.01em}
  .hcard.wide{grid-column:1/3; aspect-ratio:auto; flex-direction:row; padding:20px}
  .hcard.wide .hic{font-size:1.8rem}

  .pad{padding:0 18px}
  .search{width:100%; background:var(--pan); border:1px solid var(--line); border-radius:12px; color:var(--txt); font:inherit; font-size:.95rem; padding:12px 14px; margin-bottom:12px}
  .search::placeholder{color:var(--dimmer)} .search:focus{outline:none; border-color:var(--cyan)}
  .filters{display:flex; gap:8px; overflow-x:auto; padding-bottom:12px; scrollbar-width:none}
  .filters::-webkit-scrollbar{display:none}
  .filters button{flex:0 0 auto; background:var(--pan); border:1px solid var(--line); color:var(--dim); font:inherit; font-size:.82rem; padding:7px 13px; border-radius:20px; cursor:pointer; white-space:nowrap}
  .filters button[aria-pressed="true"]{background:rgba(127,216,240,.13); border-color:var(--cyan); color:var(--cyan)}
  .manualbtn{width:100%; background:var(--pan); border:1px dashed var(--line2); color:var(--cyan); font:inherit; font-size:.9rem; font-weight:600; padding:12px; border-radius:12px; cursor:pointer; margin-bottom:12px}
  .manualbtn:active{background:var(--pan2)}

  .list{padding:2px 18px 20px; overflow-y:auto}
  .item{display:flex; align-items:center; gap:12px; width:100%; text-align:left; background:var(--pan); border:1px solid var(--line); border-radius:12px; padding:13px 14px; margin-bottom:9px; cursor:pointer; color:var(--txt); font:inherit}
  .item:active{background:var(--pan2)}
  .item .dot{flex:0 0 auto; width:9px; height:9px; border-radius:50%}
  .dot.Endogène{background:var(--endo)} .dot.Phyto{background:var(--phyto)} .dot.Huiles{background:var(--he)} .dot.Élément{background:var(--elem)}
  .item .nm{flex:1; min-width:0; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .item .cat{font-size:.7rem; color:var(--dimmer); letter-spacing:.04em}
  .item .hz{font-variant-numeric:tabular-nums; font-weight:700; color:var(--cyan); font-size:.92rem}
  .item .fav{color:var(--gold); font-size:.9rem}
  .item .rm{flex:0 0 auto; color:var(--dimmer); font-size:1.05rem; padding:4px 6px; cursor:pointer}
  .item .rm:active{color:#e8836f}
  .empty{text-align:center; color:var(--dimmer); padding:40px 20px; font-size:.9rem}

  .pcard{display:flex; align-items:center; gap:14px; width:100%; text-align:left; background:var(--pan); border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:11px; cursor:pointer; color:var(--txt); font:inherit}
  .pcard:active{background:var(--pan2)}
  .pcard .ico{flex:0 0 auto; width:44px; height:44px; border-radius:12px; background:var(--pan2); display:flex; align-items:center; justify-content:center; font-size:1.4rem}
  .pcard .pt{flex:1; min-width:0} .pcard .pt b{font-size:1.05rem; font-weight:700} .pcard .pt span{display:block; font-size:.78rem; color:var(--dim); margin-top:2px}
  .pcard .go{color:var(--mauve); font-size:1.2rem}

  .player{flex:1; display:flex; flex-direction:column; padding:6px 20px 30px}
  .stage{position:relative; display:flex; align-items:center; justify-content:center; margin:6px 0}
  canvas{display:block; width:200px; height:200px}
  .readout{position:absolute; text-align:center; pointer-events:none}
  .hz{font-size:2.4rem; font-weight:800; line-height:1; font-variant-numeric:tabular-nums}
  .hz .u{font-size:.9rem; font-weight:600; color:var(--dim); margin-left:3px}
  .pcat{font-size:.75rem; color:var(--dim); letter-spacing:.06em; margin-top:5px}
  .beatline{font-size:.72rem; color:var(--gold); margin-top:3px; min-height:1em}
  .pformula{font-size:1.12rem; font-weight:700; letter-spacing:.02em; color:var(--txt); line-height:1.7; white-space:nowrap}
  .pformula .pfnum{color:var(--gold); font-variant-numeric:tabular-nums}

  .seg{display:flex; background:var(--pan); border:1px solid var(--line); border-radius:12px; padding:4px; margin:10px 0 16px}
  .seg button{flex:1; background:none; border:0; color:var(--dim); font:inherit; font-size:.9rem; font-weight:600; padding:9px; border-radius:9px; cursor:pointer}
  .seg button[aria-pressed="true"]{background:var(--pan2); color:var(--txt); box-shadow:0 0 0 1px var(--line)}

  .label{font-size:.68rem; letter-spacing:.14em; text-transform:uppercase; color:var(--dimmer)}
  .ctl{margin-bottom:15px}
  .ctl .row{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:7px}
  .ctl .row .v{font-variant-numeric:tabular-nums; font-weight:700}
  input[type=range]{-webkit-appearance:none; appearance:none; width:100%; height:6px; border-radius:6px; background:linear-gradient(90deg,var(--cyan),var(--mauve)); outline:none; margin:0}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none; width:22px; height:22px; border-radius:50%; background:#fff; border:3px solid var(--cyan); cursor:pointer}
  input[type=range]::-moz-range-thumb{width:20px; height:20px; border-radius:50%; background:#fff; border:3px solid var(--cyan); cursor:pointer}
  .hint.head{font-size:.76rem; color:var(--gold); margin:8px 0 0}

  .mInput{width:100%; text-align:center; background:var(--pan); border:1px solid var(--cyan); border-radius:12px; color:var(--txt); font:inherit; font-size:1.8rem; font-weight:800; font-variant-numeric:tabular-nums; padding:12px; margin-bottom:10px}
  .mInput:focus{outline:none; box-shadow:0 0 0 3px rgba(127,216,240,.25)}
  .binpanel{background:var(--pan); border:1px solid var(--line); border-radius:14px; padding:18px; margin-bottom:16px}
  .binrow{margin-bottom:14px} .binrow:last-of-type{margin-bottom:8px}
  .binrow .label{margin-bottom:4px}
  .binrow .val{margin:0; font-size:1.5rem; font-weight:800; font-variant-numeric:tabular-nums; color:var(--dim)}
  .binrow:first-child .val{color:var(--cyan)} .binrow:nth-child(2) .val{color:var(--mauve)}
  .binhint{font-size:.72rem; color:var(--dimmer); text-align:center; margin:6px 0 0}
  .keypad{display:grid; grid-template-columns:repeat(3,1fr); gap:9px}
  .keypad button{background:var(--pan); border:1px solid var(--line); color:var(--txt); font:inherit; font-size:1.3rem; font-weight:700; padding:16px 0; border-radius:11px; cursor:pointer}
  .keypad button:active{background:var(--pan2)}
  .keypad button.ok{grid-column:span 3; margin-top:2px; border:0; color:#04101f; font-size:1.05rem; font-weight:800; background:linear-gradient(96deg,var(--cyan),var(--mauve))}
  .binerr{color:#e8836f; font-size:1.4rem; font-weight:800}
  .binerrsub{color:var(--dimmer); font-size:.9rem; margin-top:8px}
  .binplay{position:relative; align-items:center; justify-content:center}
  .starfield{position:absolute; inset:0; width:100%; height:100%; pointer-events:none}
  .binplay-content{position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; gap:10px; width:100%}
  .binplay .f1{color:var(--cyan); font-size:1.05rem; font-weight:700; margin:0}
  .binplay .f2{color:var(--mauve); font-size:1.05rem; font-weight:700; margin:0}
  .binplay .beat{color:var(--gold); font-size:2rem; font-weight:800; margin:6px 0 14px}

  .fine{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:18px}
  .fine button{flex:1 1 17%; background:var(--pan); border:1px solid var(--line); color:var(--txt); font:inherit; font-size:.8rem; font-weight:700; font-variant-numeric:tabular-nums; padding:11px 2px; border-radius:9px; cursor:pointer}
  .fine button:active{background:var(--pan2)}

  .timer{display:flex; gap:7px; margin-bottom:16px}
  .timer button{flex:1; background:var(--pan); border:1px solid var(--line); color:var(--dim); font:inherit; font-size:.82rem; padding:9px 0; border-radius:9px; cursor:pointer; font-variant-numeric:tabular-nums}
  .timer button[aria-pressed="true"]{background:rgba(233,201,106,.13); border-color:var(--gold); color:var(--gold)}
  .tclock{text-align:center; font-variant-numeric:tabular-nums; color:var(--gold); font-weight:700; min-height:1.2em; margin:-8px 0 14px; font-size:.95rem}

  .actions{margin-top:auto; display:flex; gap:10px}
  .play{flex:1; padding:17px; border:0; border-radius:15px; font:inherit; font-size:1.1rem; font-weight:800; cursor:pointer; color:#04101f; background:linear-gradient(96deg,var(--cyan),var(--mauve))}
  .play:active{transform:translateY(1px)}
  .play.on{background:linear-gradient(96deg,#e8836f,#e6b866); color:#2a0f08}
  .favbtn{flex:0 0 auto; width:58px; border-radius:15px; border:1px solid var(--line2); background:var(--pan); color:var(--dimmer); font-size:1.4rem; cursor:pointer}
  .favbtn.on{color:var(--gold); border-color:var(--gold)}
  .disc{font-size:.7rem; color:var(--dimmer); text-align:center; margin-top:16px; line-height:1.5}

  .prog{height:8px; border-radius:6px; background:var(--pan); overflow:hidden; margin:4px 0 6px}
  .prog i{display:block; height:100%; background:linear-gradient(90deg,var(--cyan),var(--mauve)); width:0; transition:width .5s linear}
  .steps{margin:14px 0 0; padding:0; list-style:none}
  .steps li{display:flex; align-items:center; gap:10px; padding:10px 12px; border:1px solid var(--line); border-radius:10px; margin-bottom:7px; font-size:.9rem; color:var(--dim)}
  .steps li.active{border-color:var(--cyan); background:rgba(127,216,240,.08); color:var(--txt)}
  .steps li.done{opacity:.5}
  .steps li .si{width:22px; height:22px; border-radius:50%; background:var(--pan2); font-size:.72rem; font-weight:700; display:flex; align-items:center; justify-content:center; color:var(--dim); flex:0 0 auto}
  .steps li.active .si{background:var(--cyan); color:#04101f}
  .steps li .sn{flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:600}
  .steps li .sh{font-variant-numeric:tabular-nums; color:var(--cyan); font-size:.82rem}
  .steps li .sm{font-variant-numeric:tabular-nums; color:var(--dimmer); font-size:.75rem}

  .gnow{position:absolute; text-align:center; pointer-events:none}
  .gnow .gn{font-size:1.7rem; font-weight:800; line-height:1}
  .gnow .gf{font-size:.72rem; color:var(--cyan); font-variant-numeric:tabular-nums; margin-top:3px}
  .grow{display:flex; gap:6px; margin:12px 0 4px; justify-content:center; flex-wrap:wrap}
  .gnote{flex:0 0 auto; min-width:46px; text-align:center; background:var(--pan); border:1px solid var(--line); border-radius:9px; padding:8px 5px; transition:.1s}
  .gnote.on{background:rgba(127,216,240,.14); border-color:var(--cyan); color:var(--cyan); transform:translateY(-3px)}
  .gnote b{display:block; font-size:.95rem; font-weight:800}
  .gratios{text-align:center; color:var(--gold); font-size:.8rem; font-variant-numeric:tabular-nums; margin:2px 0 0}
  .gsym{text-align:center; color:var(--dim); font-size:.78rem; margin:2px 0 6px}

  .flashmsg{position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px); background:var(--pan2); border:1px solid var(--gold); color:var(--gold); font-size:.82rem; font-weight:600; padding:10px 18px; border-radius:12px; opacity:0; pointer-events:none; transition:opacity .25s, transform .25s; z-index:20; max-width:80%; text-align:center}
  .flashmsg.show{opacity:1; transform:translateX(-50%) translateY(0)}
</style>

<div class="app">
  <section class="view on" id="vHome">
    <div class="bar"><p class="logo"><span class="a">AURA</span><span class="l">LIS</span></p><button class="langbtn" id="langBtn">FR</button></div>
    <div class="hgrid" id="hgrid">
      <button class="hcard" data-go="geo"><span class="hic">🔯</span><span class="hn" id="hGeo"></span></button>
      <button class="hcard" data-go="lib"><span class="hic">🎵</span><span class="hn" id="hFreq"></span></button>
      <button class="hcard" data-go="protos"><span class="hic">✨</span><span class="hn" id="hProto"></span></button>
      <button class="hcard" data-go="pulse"><span class="hic">💓</span><span class="hn" id="hPulse"></span></button>
      <button class="hcard" data-go="bin"><span class="hic">🎧</span><span class="hn" id="hBin"></span></button>
      <button class="hcard" data-go="favList"><span class="hic">⭐</span><span class="hn" id="hFav"></span></button>
    </div>
  </section>

  <section class="view" id="vLib">
    <div class="bar"><button class="backbtn" id="libBack" aria-label="Retour">‹</button><h2 id="libTitle">—</h2><span class="count" id="count"></span></div>
    <div class="pad">
      <input class="search" id="search" type="search" aria-label="Rechercher">
      <div class="filters" id="filters"></div>
      <button class="manualbtn" id="manualBtn"></button>
    </div>
    <div class="list" id="list"></div>
  </section>

  <section class="view" id="vProtos">
    <div class="bar"><button class="backbtn" id="protBack" aria-label="Retour">‹</button><h2 id="protTitle">—</h2></div>
    <div class="list" id="protoList"></div>
  </section>

  <section class="view" id="vPlay">
    <div class="bar"><button class="backbtn" id="back" aria-label="Retour">‹</button><h2 id="pTitle">—</h2></div>
    <div class="player">
      <div class="stage"><canvas id="viz" width="400" height="400" aria-hidden="true"></canvas>
        <div class="readout"><div class="hz"><span id="hzval">0</span><span class="u">Hz</span></div><div class="pcat" id="pcat"></div></div></div>
      <div id="manualWrap" hidden>
        <p class="label" id="hzLabel" style="margin-bottom:8px"></p>
        <input class="mInput" id="mInput" type="number" inputmode="decimal" step="0.01" min="20" max="1000" value="100.00" aria-label="Hz">
        <div class="fine">
          <button data-d="-100">−100</button><button data-d="-10">−10</button><button data-d="-1">−1</button><button data-d="-0.1">−0.1</button><button data-d="-0.01">−0.01</button>
          <button data-d="0.01">+0.01</button><button data-d="0.1">+0.1</button><button data-d="1">+1</button><button data-d="10">+10</button><button data-d="100">+100</button>
        </div>
      </div>
      <div class="ctl"><div class="row"><span class="label" id="volLabel"></span><span class="v"><span id="volLbl">50</span> %</span></div><input type="range" id="vol" min="0" max="100" step="1" value="50"></div>
      <p class="label" id="timerLabel" style="margin-bottom:8px"></p>
      <div class="timer" id="timer"></div><div class="tclock" id="tclock"></div>
      <div class="actions"><button class="play" id="play"></button><button class="favbtn" id="fav">☆</button></div>
      <p class="disc" id="discSingle"></p>
    </div>
  </section>

  <section class="view" id="vSeq">
    <div class="bar"><button class="backbtn" id="sBack" aria-label="Retour">‹</button><h2 id="sTitle">—</h2></div>
    <div class="player">
      <div class="stage"><canvas id="sViz" width="400" height="400" aria-hidden="true"></canvas>
        <div class="readout"><div class="hz"><span id="sHz">0</span><span class="u">Hz</span></div><div class="pcat" id="sStep"></div><div class="beatline" id="sClock"></div></div></div>
      <div class="prog"><i id="sBar"></i></div>
      <div class="ctl"><div class="row"><span class="label" id="sVolLabel"></span><span class="v"><span id="sVolLbl">50</span> %</span></div><input type="range" id="sVol" min="0" max="100" step="1" value="50"></div>
      <ul class="steps" id="sSteps"></ul>
      <div class="actions"><button class="play" id="sPlay"></button></div>
      <p class="disc" id="discSeq"></p>
    </div>
  </section>

  <section class="view" id="vGeo">
    <div class="bar"><button class="backbtn" id="geoBack" aria-label="Retour">‹</button><h2 id="geoTitle">—</h2></div>
    <div class="pad"><div class="filters" id="geoFilters"></div></div>
    <div class="list" id="geoList"></div>
  </section>

  <section class="view" id="vGeoPlay">
    <div class="bar"><button class="backbtn" id="gBack" aria-label="Retour">‹</button><h2 id="gTitle">—</h2></div>
    <div class="player">
      <div class="stage"><canvas id="gViz" width="400" height="400" aria-hidden="true"></canvas>
        <div class="gnow"><div class="gn" id="gNowN">—</div><div class="gf" id="gNowF"></div></div></div>
      <p class="gsym" id="gSym"></p>
      <p class="gratios" id="gRatios"></p>
      <div class="grow" id="gRow"></div>
      <p class="label" id="gInstrLabel" style="margin:10px 0 8px"></p>
      <div class="filters" id="gInstr"></div>
      <div class="seg" role="group" aria-label="Boucle"><button id="gLoopOn" aria-pressed="true"></button><button id="gLoopOff" aria-pressed="false"></button></div>
      <div class="ctl"><div class="row"><span class="label" id="gTempoLabel"></span><span class="v" id="gDurLbl">72 bpm · 0.83 s</span></div><input type="range" id="gDur" min="50" max="120" step="1" value="72"></div>
      <div class="ctl"><div class="row"><span class="label" id="gVolLabel"></span><span class="v"><span id="gVolLbl">50</span> %</span></div><input type="range" id="gVol" min="0" max="100" step="1" value="50"></div>
      <div class="ctl"><div class="row"><span class="label" id="gReverbLabel"></span><span class="v"><span id="gReverbVal">0</span> %</span></div><input type="range" id="gReverb" min="0" max="100" step="1" value="0"></div>
      <div class="ctl"><div class="row"><span class="label" id="gEchoLabel"></span><span class="v"><span id="gEchoVal">0</span> %</span></div><input type="range" id="gEcho" min="0" max="100" step="1" value="0"></div>
      <div class="ctl"><div class="row"><span class="label" id="gDelayLabel"></span><span class="v"><span id="gDelayVal">250</span> ms</span></div><input type="range" id="gDelay" min="50" max="800" step="10" value="250"></div>
      <div class="actions"><button class="play" id="gPlay"></button><button class="favbtn" id="gFav">☆</button></div>
      <p class="disc" id="discGeo"></p>
    </div>
  </section>

  <section class="view" id="vPulse">
    <div class="bar"><button class="backbtn" id="pBack" aria-label="Retour">‹</button><h2 id="pulseTitle">—</h2></div>
    <div class="player">
      <div class="stage"><canvas id="pViz" width="400" height="400" aria-hidden="true"></canvas>
        <div class="readout"><div class="pformula">ॐ = 432 Hz —Ω— <span class="pfnum" id="pBpmNum">72</span> BPM = φ</div></div></div>
      <div class="ctl"><div class="row"><span class="label" id="pTempoLabel"></span><span class="v" id="pBpmVal">72 bpm</span></div><input type="range" id="pBpm" min="40" max="120" step="1" value="72"></div>
      <div class="ctl"><div class="row"><span class="label" id="pVolLabel"></span><span class="v"><span id="pVolLbl">50</span> %</span></div><input type="range" id="pVol" min="0" max="100" step="1" value="50"></div>
      <div class="actions"><button class="play" id="pPlay"></button><button class="favbtn" id="pFav">☆</button></div>
      <p class="disc" id="discPulse"></p>

    bin.master=ctx.createGain(); bin.master.gain.setValueAtTime(0.0001,ti); bin.master.gain.linearRampToValueAtTime(bin.vol,ti+0.05); bin.master.connect(ctx.destination);
    bin.oscA=ctx.createOscillator(); bin.oscA.type="sine"; bin.oscA.frequency.setValueAtTime(bin.f1,ti);
    bin.oscB=ctx.createOscillator(); bin.oscB.type="sine"; bin.oscB.frequency.setValueAtTime(bin.f2,ti);
    var pa=ctx.createStereoPanner(); pa.pan.setValueAtTime(-1,ti); var pb=ctx.createStereoPanner(); pb.pan.setValueAtTime(1,ti);
    bin.oscA.connect(pa); pa.connect(bin.master); bin.oscB.connect(pb); pb.connect(bin.master);
    bin.oscA.start(ti); bin.oscB.start(ti); bin.playing=true; }
  function binStop(immediate){ if(!ctx||!bin.master){ bin.playing=false; return; }
    var ti=ctx.currentTime,m=bin.master,a=bin.oscA,b=bin.oscB;
    try{ m.gain.cancelScheduledValues(ti); m.gain.setValueAtTime(m.gain.value,ti); m.gain.linearRampToValueAtTime(0.0001,ti+(immediate?0.02:0.06)); }catch(e){}
    setTimeout(function(){ [a,b].forEach(function(o){try{o.stop();o.disconnect();}catch(e){}}); try{m.disconnect();}catch(e){} }, immediate?40:120);
    bin.master=null; bin.oscA=null; bin.oscB=null; bin.playing=false; }
  $("binVol").addEventListener("input",function(){ bin.vol=parseInt(this.value,10)/100; $("binVolLbl").textContent=this.value; if(bin.master&&ctx)bin.master.gain.setTargetAtTime(bin.playing?bin.vol:0,ctx.currentTime,0.02); });
  $("binStop").addEventListener("click",function(){ binStop(false); show("home"); });

  // ---------- favoris (liste) ----------
  function favIcon(it){ if(it.type==="freq")return it.manual?"⌨":"🎵"; if(it.type==="geo")return GEO[it.idx].ic; if(it.type==="proto")return PROTOS[it.idx].ic; if(it.type==="pulse")return "💓"; return ""; }
  function favLabel(it){ if(it.type==="freq")return it.manual?t("manual_title"):it.n; if(it.type==="geo")return GEO[it.idx].name; if(it.type==="proto")return pname(PROTOS[it.idx]); if(it.type==="pulse")return t("home_pulse"); return ""; }
  function favSub(it){ if(it.type==="freq")return it.f.toFixed(2)+" Hz"; if(it.type==="geo")return GEO[it.idx].sym[lang]||GEO[it.idx].sym.fr; if(it.type==="proto")return PROTOS[it.idx].s.length+" "+t("steps"); if(it.type==="pulse")return it.bpm+" bpm"; return ""; }
  function favOpen(it){ if(it.type==="freq")openPlayer(it.manual?{n:null,f:it.f,c:null,manual:true}:{n:it.n,f:it.f,c:it.c},"favList");
    else if(it.type==="geo")gOpen(it.idx,"favList"); else if(it.type==="proto")openSeq(it.idx,"favList"); else if(it.type==="pulse")openPulse("favList",it.bpm); }
  function renderFavList(){ $("favTitle").textContent=t("fav_title"); var el=$("favListEl"); el.innerHTML="";
    favSlots.forEach(function(it,i){
      if(it){ var row=document.createElement("button"); row.className="item";
        row.innerHTML='<span class="nm">'+favIcon(it)+' '+favLabel(it)+'<br><span class="cat">'+favSub(it)+'</span></span><span class="rm" data-i="'+i+'">✕</span>';
        row.addEventListener("click",function(ev){ if(ev.target.classList.contains("rm"))return; favOpen(it); });
        row.querySelector(".rm").addEventListener("click",function(ev){ ev.stopPropagation(); favSlots[i]=null; saveFavSlots(); renderFavList(); });
        el.appendChild(row);
      } else { var row2=document.createElement("div"); row2.className="item"; row2.style.opacity=".45"; row2.style.cursor="default";
        row2.innerHTML='<span class="nm">'+t("fav_empty")+'</span>'; el.appendChild(row2); }
    });
  }

  makeViz("viz",function(){return state.playing;});
  makeViz("sViz",function(){return seq.playing;});
  makeViz("pViz",function(){return pulse.playing;});

  applyLang(); show("home");
})();
</script>
